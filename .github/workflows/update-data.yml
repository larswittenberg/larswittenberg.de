name: Update Starred Repositories Data

on:
  # Führt den Job täglich um 03:00 Uhr aus
  schedule:
    - cron: '0 3 * * *'
  # Ermöglicht das manuelle Starten des Workflows von der Actions-Seite
  workflow_dispatch:

permissions:
  contents: write

jobs:
  update-data:
    runs-on: ubuntu-latest

    steps:
      - name: Code auschecken
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GH_TOKEN }}

      - name: Corepack aktivieren
        run: corepack enable

      - name: Node.js einrichten
        uses: actions/setup-node@v4
        with:
          node-version: '20' # Die Node.js-Version, die dein Projekt verwendet
          cache: 'yarn'

      - name: Dependencies installieren
        run: yarn install --immutable

      - name: Daten aktualisieren
        run: yarn update-stars
        env:
          GH_USERNAME: ${{ secrets.GH_USERNAME }}
          GH_TOKEN: ${{ secrets.GH_TOKEN }}

      - name: Änderungen committen und pushen
        run: |
          git config --global user.name 'github-actions[bot]'
          git config --global user.email 'github-actions[bot]@users.noreply.github.com'
          git add src/data/starred-repositories.json
          # Prüfen, ob es Änderungen gibt, um einen leeren Commit zu vermeiden
          if ! git diff --staged --quiet; then
            git commit -m "chore: update starred repositories data"
            git push
          else
            echo "Keine Änderungen an den Daten. Nichts zu committen."
          fi
